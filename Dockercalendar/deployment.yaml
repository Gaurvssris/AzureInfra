apiVersion: apps/v1
kind: Deployment
metadata:
  name: calendar-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: calendar

  template:
    metadata:
      labels:
        app: calendar

    spec:
      containers:
      - name: calendar

        image: acrdev9838.azurecr.io/june-calendar:v1

        ports:
        - containerPort: 80