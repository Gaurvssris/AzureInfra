trigger:
- main

pool:
  name: Dockernewagent

variables:
  terraformVersion: '1.6.6'
  workingDirDev: '$(System.DefaultWorkingDirectory)/Root/Dev'
  workingDirQA: '$(System.DefaultWorkingDirectory)/Root/QA'
  workingDirProd: '$(System.DefaultWorkingDirectory)/Root/Prod'

stages:

# =========================
# DEV STAGE
# =========================
- stage: Dev
  displayName: "DEV - Init / FMT / Validate"
  jobs:
  - job: DevJob
    steps:

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - task: TerraformTask@5
      displayName: "Terraform Init DEV"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(workingDirDev)
        backendServiceArm: 'ACRAKS'
        backendAzureRmStorageAccountName: 'gauravbackupstorage'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'dev.tfstate'

    - script: terraform fmt -recursive
      workingDirectory: $(workingDirDev)
      displayName: "Terraform FMT DEV"

    - script: terraform validate
      workingDirectory: $(workingDirDev)
      displayName: "Terraform Validate DEV"


# =========================
# QA STAGE
# =========================
- stage: QA
  displayName: "QA - Init / Validate"
  dependsOn: Dev
  jobs:
  - job: QAJob
    steps:

    - task: TerraformTask@5
      displayName: "Terraform Init QA"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(workingDirQA)
        backendServiceArm: 'ACRAKS'
        backendAzureRmStorageAccountName: 'gauravbackupstorage'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'qa.tfstate'

    - script: terraform validate
      workingDirectory: $(workingDirQA)
      displayName: "Terraform Validate QA"


# =========================
# PROD STAGE
# =========================
- stage: Prod
  displayName: "PROD - Init / Validate"
  dependsOn: QA
  jobs:
  - job: ProdJob
    steps:

    - task: TerraformTask@5
      displayName: "Terraform Init PROD"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(workingDirProd)
        backendServiceArm: 'ACRAKS'
        backendAzureRmStorageAccountName: 'gauravbackupstorage'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'prod.tfstate'

    - script: terraform validate
      workingDirectory: $(workingDirProd)
      displayName: "Terraform Validate PROD"


# =========================
# SECURITY SCAN STAGE
# =========================
- stage: SecurityScan
  displayName: "Security Scan - TFLint / TFSEC / Checkov"
  dependsOn: Prod
  jobs:
  - job: ScanJob
    steps:

    # =========================
    # TFLINT (Safe Windows install)
    # =========================
    - powershell: |
        Write-Host "Installing TFLint..."

        Invoke-WebRequest `
          -Uri "https://github.com/terraform-linters/tflint/releases/latest/download/tflint_windows_amd64.zip" `
          -OutFile "$(Agent.TempDirectory)\tflint.zip"

        Expand-Archive "$(Agent.TempDirectory)\tflint.zip" -DestinationPath "$(Agent.TempDirectory)\tflint"

        echo "##vso[task.prependpath]$(Agent.TempDirectory)\tflint"
      displayName: "Install TFLint"

    - powershell: |
        tflint --init
        tflint
      workingDirectory: '$(System.DefaultWorkingDirectory)'
      displayName: "Run TFLint"


    # =========================
    # TFSEC (FIXED - no System32)
    # =========================
    - powershell: |
        Write-Host "Installing TFSEC..."

        Invoke-WebRequest `
          -Uri "https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-windows-amd64.exe" `
          -OutFile "$(Agent.TempDirectory)\tfsec.exe"

        echo "##vso[task.prependpath]$(Agent.TempDirectory)"

        & "$(Agent.TempDirectory)\tfsec.exe" --version
      displayName: "Install TFSEC"

    - powershell: |
        tfsec .
      workingDirectory: '$(System.DefaultWorkingDirectory)'
      displayName: "Run TFSEC"


    # =========================
    # CHECKOV
    # =========================
    - powershell: |
        pip install --upgrade checkov
      displayName: "Install Checkov"

    - powershell: |
        checkov -d .
      workingDirectory: '$(System.DefaultWorkingDirectory)'
      displayName: "Run Checkov"